<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Website Helper</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f7fb;
    }

    .chat-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    #chatOutput {
      border: 1px solid #ddd;
      border-radius: 8px;
      min-height: 250px;
      padding: 15px;
      background: #fafafa;
      margin-bottom: 15px;
      white-space: pre-line;
    }

    #chatForm {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #userInput {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <div class="chat-box">
    <h1>AI Website Helper</h1>
    <p>Ask a question about the website content.</p>

    <div id="chatOutput">Bot: Hello, I am your website helper.</div>

    <form id="chatForm">
      <input
        type="text"
        id="userInput"
        placeholder="Type your question here"
        autocomplete="off"
      />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const websiteKnowledge = [
      {
        keywords: ["admissions", "apply", "application"],
        answer: "Our admissions information is available on the website admissions page."
      },
      {
        keywords: ["contact", "phone", "email"],
        answer: "Our contact details are available on the website contact page."
      },
      {
        keywords: ["term dates", "calendar", "holiday"],
        answer: "Our term dates are available on the website calendar or term dates page."
      }
    ];

    const refusalMessage =
      "Sorry, I can only answer based on information available on this website and its documents.";

    const chatForm = document.getElementById("chatForm");
    const userInput = document.getElementById("userInput");
    const chatOutput = document.getElementById("chatOutput");

    function getBotReply(question) {
      const lowerQuestion = question.toLowerCase();

      for (let item of websiteKnowledge) {
        for (let keyword of item.keywords) {
          if (lowerQuestion.includes(keyword)) {
            return item.answer;
          }
        }
      }

      return refusalMessage;
    }

    chatForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const question = userInput.value.trim();
      if (!question) return;

      const botReply = getBotReply(question);

      chatOutput.innerText += "\n\nYou: " + question;
      chatOutput.innerText += "\nBot: " + botReply;

      userInput.value = "";
      userInput.focus();
    });
  </script>
</body>
</html>
