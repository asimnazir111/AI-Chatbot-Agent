<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Website Helper</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f7fb;
    }

    .chat-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    #chatOutput {
      border: 1px solid #ddd;
      border-radius: 8px;
      min-height: 250px;
      padding: 15px;
      background: #fafafa;
      margin-bottom: 15px;
      white-space: pre-line;
    }

    #chatForm {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #userInput {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <div class="chat-box">
    <h1>AI Website Helper</h1>
    <p>Ask a question about the website content.</p>

    <div id="chatOutput">Bot: Hello, I am your website helper.</div>

    <form id="chatForm">
      <input
        type="text"
        id="userInput"
        placeholder="Type your question here"
        autocomplete="off"
      />
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const WORKER_URL = "YOUR-WORKER-URL-HERE";

    const chatForm = document.getElementById("chatForm");
    const userInput = document.getElementById("userInput");
    const chatOutput = document.getElementById("chatOutput");

    chatForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const question = userInput.value.trim();
      if (!question) return;

      chatOutput.innerText += "\n\nYou: " + question;
      chatOutput.innerText += "\nBot: Thinking...";

      userInput.value = "";
      userInput.focus();

      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question: question })
        });

        const data = await response.json();

        chatOutput.innerText = chatOutput.innerText.replace(
          "Bot: Thinking...",
          "Bot: " + (data.message || "No reply received.")
        );
      } catch (error) {
        chatOutput.innerText = chatOutput.innerText.replace(
          "Bot: Thinking...",
          "Bot: Sorry, there was an error connecting to the server."
        );
      }
    });
  </script>
</body>
</html>
